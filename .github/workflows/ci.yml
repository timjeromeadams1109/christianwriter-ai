name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies


        run: npm ci

      - name: Install @stack/core from source
        run: npm install --no-save github:timjeromeadams1109/stack-core

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/placeholder?sslmode=require
          NEXTAUTH_URL: https://placeholder.example.com
          NEXTAUTH_SECRET: placeholder-nextauth-secret
          GOOGLE_CLIENT_ID: placeholder-google-client-id
          GOOGLE_CLIENT_SECRET: placeholder-google-client-secret
          ANTHROPIC_API_KEY: sk-ant-placeholder
          API_BIBLE_KEY: placeholder-api-bible-key
          ESV_API_KEY: placeholder-esv-api-key
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          STRIPE_PRICE_PRO: price_placeholder_pro
          STRIPE_PRICE_MINISTRY: price_placeholder_ministry
          NEXT_PUBLIC_APP_URL: https://placeholder.example.com
